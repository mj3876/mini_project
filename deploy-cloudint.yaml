apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-cloudint #rancher desktop에서 실행하여 namespace는 추가하지 않음
  labels:
    app: test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
      - name: cloudint
        image: mj3876/cloud_interview:1.3
        ports:
        - containerPort: 5000