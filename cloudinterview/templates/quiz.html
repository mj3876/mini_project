<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 음성 면접</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 800px;">
        <div class="text-center mb-4">
            <span class="badge bg-primary">{{ question.category }}</span>
            <h2 class="mt-2">Q. {{ question.content }}</h2>
            
            <audio id="qAudio" src="{{ audio_url }}" autoplay></audio>
            <button onclick="document.getElementById('qAudio').play()" class="btn btn-sm btn-outline-secondary">🔈 다시 듣기</button>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body text-center">
                <button id="recordBtn" class="btn btn-danger btn-lg rounded-circle p-4">🎤</button>
                <p id="status" class="mt-3 text-muted">버튼을 눌러 답변을 말씀해주세요</p>
            </div>
        </div>

        <form action="{{ url_for('quiz.submit') }}" method="post">
            <div class="mb-3">
                <label class="form-label">인식된 답변 내용:</label>
                <textarea id="userAnswer" name="user_answer" class="form-control" rows="5" placeholder="음성 인식이 완료되면 여기에 텍스트가 나타납니다." required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100 py-3">평가 제출하기</button>
        </form>
    </div>

    <script>
        // Web Speech API를 이용한 음성 인식 (STT)
        const recordBtn = document.getElementById('recordBtn');
        const userAnswer = document.getElementById('userAnswer');
        const status = document.getElementById('status');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ko-KR';
        recognition.interimResults = false;

        recordBtn.onclick = () => {
            recognition.start();
            status.innerText = "🎤 듣고 있습니다... 말씀해주세요.";
            recordBtn.classList.add('pulse-animation'); // 애니메이션 효과용
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            userAnswer.value = text;
            status.innerText = "✅ 인식 완료!";
        };

        recognition.onerror = () => {
            status.innerText = "❌ 인식에 실패했습니다. 다시 시도해주세요.";
        };
    </script>

    <style>
        .pulse-animation { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</body>
</html>
