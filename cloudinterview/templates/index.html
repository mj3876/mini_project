<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>클라우드 면접 대비</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h2 class="mb-4">🚀 모의 면접 시작하기</h2>
                <form action="{{ url_for('quiz.start') }}" method="post">
                    <select name="category" class="form-select mb-3" required>
                        <option value="" disabled selected>카테고리를 선택하세요</option>
                        <option value="네트워크(1계층)">네트워크 (1계층)</option>
                        <option value="네트워크(2계층)">네트워크 (2계층)</option>
                        <option value="네트워크(3계층)">네트워크 (3계층)</option>
                        <option value="네트워크(4계층)">네트워크 (4계층)</option>
                        <option value="도커(기본/이미지)">도커</option>
                        <option value="쿠버네티스(아키텍처/컨트롤러)">쿠버네티스</option>
                        <option value="클라우드(고가용성/보안)">클라우드 아키텍처</option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100">면접 시작</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
