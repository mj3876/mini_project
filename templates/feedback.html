<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>평가 결과</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2235;
            --border: #1e2d45;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --success: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text: #e2e8f0;
            --muted: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        .container { max-width: 760px; margin: 0 auto; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 점수 헤더 */
        .score-header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeUp 0.4s ease both;
        }
        .score-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }
        .score-value {
            font-size: 72px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .score-suffix {
            font-size: 24px;
            font-weight: 300;
            color: var(--muted);
            -webkit-text-fill-color: var(--muted);
        }
        /* 점수별 색상 */
        .score-high .score-value { background: linear-gradient(135deg, var(--success), #34d399); -webkit-background-clip: text; background-clip: text; }
        .score-mid  .score-value { background: linear-gradient(135deg, var(--warn), #fcd34d);   -webkit-background-clip: text; background-clip: text; }
        .score-low  .score-value { background: linear-gradient(135deg, var(--danger), #f87171); -webkit-background-clip: text; background-clip: text; }

        /* 공통 카드 */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px 32px;
            margin-bottom: 20px;
        }
        .card-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            margin-bottom: 14px;
        }
        .card-label.feedback { color: var(--accent); }
        .card-label.answer   { color: var(--muted); }
        .card-label.model    { color: var(--success); }

        .card-text {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text);
        }

        /* 피드백 카드 강조 */
        .feedback-card {
            border-left: 3px solid var(--accent);
            animation: fadeUp 0.5s ease both;
        }
        .answer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            animation: fadeUp 0.6s ease both;
        }
        @media (max-width: 600px) { .answer-grid { grid-template-columns: 1fr; } }

        .model-card { border-left: 3px solid var(--success); }

        /* 버튼 */
        .btn-row {
            display: flex;
            gap: 12px;
            animation: fadeUp 0.7s ease both;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: opacity 0.2s, transform 0.1s;
            display: block;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
        .btn-ghost   { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    </style>
</head>
<body>
    <div class="container">

        <!-- 점수 -->
        {% set score = eval_result.score | int %}
        <div class="score-header {% if score >= 80 %}score-high{% elif score >= 50 %}score-mid{% else %}score-low{% endif %}">
            <div class="score-label">AI EVALUATION RESULT</div>
            <div class="score-value">{{ score }}<span class="score-suffix">점</span></div>
        </div>

        <!-- 피드백 -->
        <div class="card feedback-card">
            <div class="card-label feedback">💡 AI 피드백</div>
            <div class="card-text">{{ eval_result.feedback }}</div>
        </div>

        <!-- 내 답변 / 모범 답안 -->
        <div class="answer-grid">
            <div class="card">
                <div class="card-label answer">📝 내 답변</div>
                <div class="card-text">{{ user_answer }}</div>
            </div>
            <div class="card model-card">
                <div class="card-label model">✅ 모범 답안 키워드</div>
                <div class="card-text">{{ question.model_answer }}</div>
            </div>
        </div>

        <!-- 버튼 -->
        <div class="btn-row">
            <a href="{{ url_for('main.index') }}" class="btn btn-ghost">← 카테고리 변경</a>
            <a href="{{ url_for('quiz.question') }}" class="btn btn-primary">다음 질문 →</a>
        </div>
    </div>
</body>
</html>
