apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment #rancher desktop에서 실행하여 namespace는 추가하지 않음
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: mj3876/cloud_interview:1.1
        ports:
        - containerPort: 5000 #이미지(5000)->컨테니어(파드)(5000)
        env:
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_USER
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_HOST
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_NAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PORT
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: GEMINI_API_KEY